<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wilson Goon Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
  <style>
    :root {
      --glow-color: #00ff88;
      --bg-color: #0a0a0c;
    }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    /* Premium Translucent Card */
    .card {
      background: rgba(20, 20, 25, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px 60px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 255, 136, 0.05);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transform: translateY(0px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 255, 136, 0.3);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(0, 255, 136, 0.1);
    }

    h1 { 
      margin: 0 0 15px 0; 
      font-size: 16px; 
      color: #8a8f98; 
      text-transform: uppercase; 
      letter-spacing: 2px;
      font-weight: 700;
    }

    /* Cyberpunk Neon Glow Number */
    #counter { 
      font-size: 96px; 
      font-weight: 900; 
      color: var(--glow-color); 
      margin: 0;
      line-height: 1;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.4), 0 0 40px rgba(0, 255, 136, 0.2);
    }

    .status { 
      font-size: 13px; 
      color: #525866; 
      margin-top: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Active pulse dot */
    .pulse-dot {
      width: 6px;
      height: 6px;
      background-color: var(--glow-color);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--glow-color);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 14px var(--glow-color); }
      100% { transform: scale(0.95); opacity: 0.5; }
    }

    /* Bouncing Element Style */
    #bouncing-counter {
      position: absolute;
      left: 0;
      top: 0;
      font-size: 140px;
      font-weight: 900;
      color: var(--glow-color);
      opacity: 0.25;
      line-height: 1;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      user-select: none;
      pointer-events: none;
      z-index: 1;
      will-change: transform;
    }
  </style>
</head>
<body>

  <div id="bouncing-counter">0</div>

  <div class="card">
    <h1>Wilson Goon Count</h1>
    <div id="counter">...</div>
    <div class="status">
      <span class="pulse-dot"></span> 
      <!-- Embedded tag to handle the updates smoothly -->
      <span id="status-text">Fetching live data...</span>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://fgybbofeczxqpzpotcuk.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZneWJib2ZlY3p4cXB6cG90Y3VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMzUxNjYsImV4cCI6MjA5NDkxMTE2Nn0.-5dHj_Z2kY8JqIuEforXz0XCqcy1SIDBIKA_f8dg1gg";

    function fetchCount() {
      fetch(`${SUPABASE_URL}/rest/v1/counter_store?id=eq.1`, {
        method: "GET",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data && data.length > 0) {
          let realCount = data[0].count - 3;
          if (realCount < 0) realCount = 0;

          document.getElementById('counter').innerText = realCount;
          document.getElementById('bouncing-counter').innerText = realCount;

          // --- LOGIC FOR THE TRACKER STATUS ---
          const statusText = document.getElementById('status-text');
          if (realCount <= 5) {
            statusText.innerText = "🟢 Threat Level: Safe";
          } else if (realCount <= 15) {
            statusText.innerText = "🟡 Threat Level: Concerning";
          } else {
            statusText.innerText = "🔴 Threat Level: Critical Goon Levels";
          }
        }
      })
      .catch(error => {
        console.error("Error fetching count:", error);
        document.getElementById('counter').innerText = "ERROR";
        document.getElementById('bouncing-counter').innerText = "!!";
        document.getElementById('status-text').innerText = "❌ System Override Required";
      });
    }

    fetchCount();

    // --- RE-ENGINEERED PHYSICS SYSTEM ---
    const bounceEl = document.getElementById('bouncing-counter');
    
    let vx = 3.5; 
    let vy = 2.5; 
    
    let posX = window.innerWidth / 2 - 100;
    let posY = window.innerHeight / 2 - 50;

    function updatePhysics() {
      const elWidth = bounceEl.offsetWidth;
      const elHeight = bounceEl.offsetHeight;

      posX += vx;
      posY += vy;

      if (posX <= 0) {
        posX = 0;
        vx = -vx;
      } else if (posX >= window.innerWidth - elWidth) {
        posX = window.innerWidth - elWidth;
        vx = -vx;
      }

      if (posY <= 0) {
        posY = 0;
        vy = -vy;
      } else if (posY >= window.innerHeight - elHeight) {
        posY = window.innerHeight - elHeight;
        vy = -vy;
      }

      bounceEl.style.transform = `translate(${posX}px, ${posY}px)`;

      requestAnimationFrame(updatePhysics);
    }

    updatePhysics();
  </script>
</body>
</html>
