<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Incognito Counter</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e1e1e;
      padding: 30px 50px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      border: 1px solid #333;
    }
    h1 { margin: 0 0 10px 0; font-size: 20px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    #counter { font-size: 72px; font-weight: 800; color: #00ff88; margin: 0; }
    .status { font-size: 12px; color: #666; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Wilson Goon Count</h1>
    <div id="counter">...</div>
    <div class="status">Take the current number minus 3 as the real goon count</div>
  </div>

  <script>
    // Embedded app.js directly inside the HTML to keep it simple!
    const SUPABASE_URL = "https://fgybbofeczxqpzpotcuk.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZneWJib2ZlY3p4cXB6cG90Y3VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMzUxNjYsImV4cCI6MjA5NDkxMTE2Nn0.-5dHj_Z2kY8JqIuEforXz0XCqcy1SIDBIKA_f8dg1gg";

    function fetchCount() {
      fetch(`${SUPABASE_URL}/rest/v1/counter_store?id=eq.1`, {
        method: "GET",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data && data.length > 0) {
          document.getElementById('counter').innerText = data[0].count;
        }
      })
      .catch(error => {
        console.error("Error fetching count:", error);
        document.getElementById('counter').innerText = "Error";
      });
    }

    // Run immediately when the website loads
    fetchCount();
  </script>
</body>
</html>
